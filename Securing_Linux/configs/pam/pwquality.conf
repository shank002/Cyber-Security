# PAM Password Quality Configuration
# Project: Linux Hardening + CIS Benchmark
# Apply: sudo cp pwquality.conf /etc/security/pwquality.conf

# Minimum password length
minlen = 14

# Minimum number of character classes required
# (uppercase, lowercase, digits, special)
minclass = 4

# Maximum consecutive repeating characters
maxrepeat = 3

# Maximum consecutive characters from the same class
maxclassrepeat = 4

# Credit requirements (negative = required count)
dcredit = -1      # At least 1 digit
ucredit = -1      # At least 1 uppercase letter
ocredit = -1      # At least 1 special character
lcredit = -1      # At least 1 lowercase letter

# Number of previous passwords to remember (via pam_pwhistory)
# Set in /etc/pam.d/common-password: remember=5

# Reject passwords similar to the username
gecoscheck = 1
