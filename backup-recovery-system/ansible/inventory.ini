# =============================================================================
# inventory.ini — Ansible Inventory
# =============================================================================
# List all servers you want to manage here.
# Replace the example IPs/hostnames with your actual servers.
# =============================================================================

# All servers that should have the backup system installed
[backup_servers]
web-01    ansible_host=192.168.1.10
web-02    ansible_host=192.168.1.11
db-01     ansible_host=192.168.1.20

# Group variables — applied to every server in [backup_servers]
[backup_servers:vars]
ansible_user=root
ansible_ssh_private_key_file=~/.ssh/id_rsa
ansible_python_interpreter=/usr/bin/python3

# Optional: separate group for database servers if you need different config
[db_servers]
db-01     ansible_host=192.168.1.20

[db_servers:vars]
ansible_user=root
ansible_python_interpreter=/usr/bin/python3

# Parent group containing everything — useful for site-wide tasks
[all_servers:children]
backup_servers
db_servers
