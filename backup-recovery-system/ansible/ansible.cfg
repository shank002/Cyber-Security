# =============================================================================
# ansible.cfg — Ansible Configuration
# =============================================================================
# Ansible looks for this file in the current directory first, then ~/.ansible.cfg
# Place this file alongside site.yml in your project root.
# =============================================================================

[defaults]
inventory          = inventory.ini
remote_user        = root
host_key_checking  = false        # set to true in production for security
retry_files_enabled = false       # don't create .retry files on failure
stdout_callback    = yaml         # cleaner output format

# How many servers to configure in parallel
# Increase for large fleets, decrease if servers are slow
forks = 10

# Show task timing — great for spotting slow tasks
callbacks_enabled = timer, profile_tasks

[privilege_escalation]
become       = true
become_method = sudo
become_user  = root

[ssh_connection]
# Reuse SSH connections — much faster for large inventories
ssh_args = -o ControlMaster=auto -o ControlPersist=60s -o StrictHostKeyChecking=no
pipelining = true                 # reduces number of SSH operations per task
