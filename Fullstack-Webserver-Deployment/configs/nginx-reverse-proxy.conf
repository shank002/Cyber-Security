# /etc/nginx/conf.d/myapp.conf
# Nginx reverse proxy configuration for the Nexus Node.js application.
# Place this file at /etc/nginx/conf.d/myapp.conf on the server.
# After copying: sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name _;     # Accepts any hostname or IP — suitable for VM/LAN use.
                       # Replace with your domain when going public:
                       # server_name yourdomain.com www.yourdomain.com;

    # ----------------------------------------------------------------
    # Static assets — served by Nginx directly (no Node.js roundtrip)
    # ----------------------------------------------------------------
    location /css/ {
        root    /var/www/myapp/public;
        expires 7d;
        add_header Cache-Control "public";
    }

    # ----------------------------------------------------------------
    # All other requests — proxied to Node.js on localhost:3000
    # ----------------------------------------------------------------
    location / {
        proxy_pass          http://127.0.0.1:3000;
        proxy_http_version  1.1;

        # Forward real client identity to Node.js
        proxy_set_header    Host              $host;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;

        # WebSocket support (good practice even if not used now)
        proxy_set_header    Upgrade           $http_upgrade;
        proxy_set_header    Connection        'upgrade';
        proxy_cache_bypass  $http_upgrade;
    }
}

