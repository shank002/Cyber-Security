# Splunk Server — inputs.conf
# Place at: /opt/splunk/etc/system/local/inputs.conf
# This configures what the CENTRAL SERVER monitors locally

# ── Splunk internal logs (optional, for health monitoring) ───
[monitor://$SPLUNK_HOME/var/log/splunk/splunkd.log]
disabled = false
index = _internal
sourcetype = splunkd

# ── Local server's own auth log ───────────────────────────────
[monitor:///var/log/auth.log]
disabled = false
index = auth_logs
sourcetype = linux_secure
host = splunk-server

[monitor:///var/log/syslog]
disabled = false
index = os_logs
sourcetype = syslog
host = splunk-server

# ── TCP Receiving (forwarder data comes in here) ──────────────
[splunktcp://9997]
connection_host = ip
disabled = false
