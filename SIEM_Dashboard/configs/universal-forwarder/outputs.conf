# Splunk Universal Forwarder — outputs.conf
# Place at: /opt/splunkforwarder/etc/system/local/outputs.conf
# Replace CENTRAL_SERVER_IP with your Splunk indexer's IP address

[tcpout]
defaultGroup = central-indexer
sendCookedData = true

[tcpout:central-indexer]
server = CENTRAL_SERVER_IP:9997
compressed = true

# Uncomment below to enable TLS encryption (recommended for production)
# sslCertPath = $SPLUNK_HOME/etc/certs/client.pem
# sslRootCAPath = $SPLUNK_HOME/etc/certs/cacert.pem
# sslVerifyServerCert = true
# sslCommonNameToCheck = splunk-indexer
