# Splunk Universal Forwarder — inputs.conf
# Place at: /opt/splunkforwarder/etc/system/local/inputs.conf
# Adjust host = and paths per machine

# ── SSH / Auth Logs (Debian/Ubuntu) ──────────────────────────
[monitor:///var/log/auth.log]
disabled = false
index = auth_logs
sourcetype = linux_secure
host = client-hostname
crcSalt = <SOURCE>

# ── SSH / Auth Logs (Rocky Linux / RHEL) ─────────────────────
# [monitor:///var/log/secure]
# disabled = false
# index = auth_logs
# sourcetype = linux_secure
# host = client-hostname

# ── Syslog (Debian/Ubuntu) ────────────────────────────────────
[monitor:///var/log/syslog]
disabled = false
index = os_logs
sourcetype = syslog
host = client-hostname

# ── Messages (Rocky Linux) ────────────────────────────────────
# [monitor:///var/log/messages]
# disabled = false
# index = os_logs
# sourcetype = syslog
# host = client-hostname

# ── Apache Access Log (Debian/Ubuntu) ────────────────────────
[monitor:///var/log/apache2/access.log]
disabled = false
index = web_logs
sourcetype = access_combined
host = client-hostname

# ── Apache Error Log (Debian/Ubuntu) ─────────────────────────
[monitor:///var/log/apache2/error.log]
disabled = false
index = web_logs
sourcetype = apache_error
host = client-hostname

# ── Apache Logs (Rocky Linux / RHEL) ─────────────────────────
# [monitor:///var/log/httpd/access_log]
# disabled = false
# index = web_logs
# sourcetype = access_combined
# host = client-hostname

# [monitor:///var/log/httpd/error_log]
# disabled = false
# index = web_logs
# sourcetype = apache_error
# host = client-hostname

# ── Nginx Access Log ──────────────────────────────────────────
[monitor:///var/log/nginx/access.log]
disabled = false
index = web_logs
sourcetype = nginx_access
host = client-hostname

# ── Custom SSH Autologin JSON Log ─────────────────────────────
[monitor:///home/user/ssh_autologin.log]
disabled = false
index = ssh_logs
sourcetype = _json
host = client-hostname
