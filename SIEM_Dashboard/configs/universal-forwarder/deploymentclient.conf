# Universal Forwarder — deploymentclient.conf
# Place at: /opt/splunkforwarder/etc/system/local/deploymentclient.conf
# Only needed if you are using a Splunk Deployment Server
# to centrally manage forwarder configurations

[deployment-client]
# Polling interval in seconds (default 60)
phoneHomeIntervalInSecs = 60

[target-broker:deploymentServer]
# Replace with your Deployment Server IP and management port
targetUri = DEPLOYMENT_SERVER_IP:8089
