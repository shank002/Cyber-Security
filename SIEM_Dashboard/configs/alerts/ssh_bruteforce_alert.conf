# SSH Brute-Force Alert — savedsearches.conf
# Place at: /opt/splunk/etc/apps/search/local/savedsearches.conf

[SSH Brute-Force Detected]
search = index=auth_logs sourcetype=linux_secure "Failed password" | rex field=_raw "from (?P<src_ip>\d+\.\d+\.\d+\.\d+)" | bucket _time span=5m | stats count as failed_attempts by _time, src_ip, host | where failed_attempts > 10
alert.condition = search
alert.suppress = 0
alert.track = 1
alert.severity = 3
counttype = number of events
quantity = 0
relation = greater than
enableSched = 1
cron_schedule = */5 * * * *
dispatch.earliest_time = -5m
dispatch.latest_time = now
alert.email.to = your-email@example.com
alert.email.subject = [SPLUNK ALERT] SSH Brute-Force Detected
alert.actions = email
action.email = 1
action.email.sendresults = 1
action.email.format = table
