# DDoS Alert — savedsearches.conf entry
# Place at: /opt/splunk/etc/apps/search/local/savedsearches.conf

[DDoS Attack Detected - High Request Volume]
search = index=web_logs sourcetype=access_combined | bucket _time span=1m | stats count as req_count by _time, clientip, host | where req_count > 200 | sort -req_count
alert.condition = search
alert.suppress = 0
alert.track = 1
alert.severity = 5
counttype = number of events
quantity = 0
relation = greater than
enableSched = 1
cron_schedule = * * * * *
dispatch.earliest_time = -1m
dispatch.latest_time = now
alert.email.to = your-email@example.com
alert.email.subject = [CRITICAL] DDoS Attack Detected on Web Server
alert.actions = email
action.email = 1
action.email.sendresults = 1
action.email.format = table
