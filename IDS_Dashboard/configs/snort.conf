# =============================================================================
# Snort Configuration Reference
# File: /etc/snort/snort.conf
# Description: Key configuration changes made for the IDS home lab project
# Note: This is not the full snort.conf — it highlights only the sections
#       that were modified from defaults. The full file is generated on install.
# =============================================================================


# -----------------------------------------------------------------------------
# SECTION 1 — Network Variables
# Define your home network and external network
# -----------------------------------------------------------------------------

# Your defended network — change to match your lab subnet
ipvar HOME_NET 192.168.56.0/24

# Everything outside HOME_NET
ipvar EXTERNAL_NET !$HOME_NET

# DNS server IPs on your network
ipvar DNS_SERVERS $HOME_NET

# SMTP server IPs on your network
ipvar SMTP_SERVERS $HOME_NET

# HTTP server IPs on your network
ipvar HTTP_SERVERS $HOME_NET

# SQL server IPs on your network
ipvar SQL_SERVERS $HOME_NET

# Telnet server IPs on your network
ipvar TELNET_SERVERS $HOME_NET

# SSH server IPs on your network
ipvar SSH_SERVERS $HOME_NET


# -----------------------------------------------------------------------------
# SECTION 2 — Port Variables
# Define ports for common services
# -----------------------------------------------------------------------------
portvar HTTP_PORTS [80,8080,8000,8888]
portvar SHELLCODE_PORTS !80
portvar ORACLE_PORTS 1521
portvar SSH_PORTS 22
portvar FTP_PORTS 21
portvar SIP_PORTS [5060,5061,5600]
portvar FILE_DATA_PORTS [$HTTP_PORTS,110,143]
portvar GTP_PORTS [2123,2152,3386]


# -----------------------------------------------------------------------------
# SECTION 3 — File and Path Variables
# Set directories for rules, logs, and configuration files
# -----------------------------------------------------------------------------
var RULE_PATH /etc/snort/rules
var SO_RULE_PATH /etc/snort/so_rules
var PREPROC_RULE_PATH /etc/snort/preproc_rules

# Output and log directory
var LOG_DIR /var/log/snort

# White list and black list paths
var WHITE_LIST_PATH /etc/snort/rules
var BLACK_LIST_PATH /etc/snort/rules


# -----------------------------------------------------------------------------
# SECTION 4 — Network Interface
# Set during installation — verify with: ip a
# If running manually, pass with -i flag:
#   sudo snort -A console -c /etc/snort/snort.conf -i enp0s3
# -----------------------------------------------------------------------------
# config interface: enp0s3              # Uncomment and set if needed


# -----------------------------------------------------------------------------
# SECTION 5 — Decoder Configuration
# -----------------------------------------------------------------------------
config checksum_mode: all


# -----------------------------------------------------------------------------
# SECTION 6 — Output Plugins
# Configure alert and log output formats
# -----------------------------------------------------------------------------

# Alert to a text file (primary output — monitored by Splunk UF)
output alert_fast: /var/log/snort/alert

# Full packet logging
output log_tcpdump: /var/log/snort/snort.log

# Unified2 binary output (used with Barnyard2 for advanced log processing)
# output unified2: filename snort.u2, limit 128


# -----------------------------------------------------------------------------
# SECTION 7 — Preprocessors
# Protocol-level inspection modules
# -----------------------------------------------------------------------------

# Flow tracking (required for threshold rules)
preprocessor flow: stats_interval 0 hash 2

# Stream reassembly — needed for SSH and TCP-based detection
preprocessor stream5_global: track_tcp yes, track_udp yes, track_icmp no, \
    max_tcp 262144, max_udp 131072, max_active_responses 2, min_response_seconds 5

preprocessor stream5_tcp: log_asymmetric_traffic no, policy windows, \
    detect_anomalies yes, require_3whs 180, overlap_limit 10, \
    small_segments 3 bytes 150, timeout 180, \
    ports client 21 22 23 25 42 53 79 109 110 111 113 119 135 136 137 \
    139 143 161 445 513 514 587 593 691 1433 1521 1741 2100 3306 6070 \
    6665 6666 6667 6668 6669 7000 8181 32770 32771 32772 32773 32774 \
    32775 32776 32777 32778 32779, \
    ports both 36 500 2702 3000 8015 8500 15000 24000

preprocessor stream5_udp: timeout 180

preprocessor stream5_icmp: timeout 180

# HTTP inspection
preprocessor http_inspect: global iis_unicode_map unicode.map 1252 compress_depth 65535 decompress_depth 65535

preprocessor http_inspect_server: server default \
    http_methods { GET POST PUT HEAD DELETE TRACE OPTIONS CONNECT PATCH } \
    profile all ports { 80 8080 8000 8888 } oversize_dir_length 500

# FTP/Telnet
preprocessor ftp_telnet: global inspection_type stateful encrypted_traffic no check_encrypted

# SMTP
preprocessor smtp: ports { 25 465 587 691 } \
    inspection_type stateful b64_decode_depth 0 \
    qp_decode_depth 0 bitenc_decode_depth 0

# DNS
preprocessor dns: ports { 53 } enable_rdata_overflow


# -----------------------------------------------------------------------------
# SECTION 8 — Rule Files
# Load rule files — community rules + your custom rules
# -----------------------------------------------------------------------------

# Community / default Snort rules
include $RULE_PATH/local.rules

# Custom rules written for this project
# This is the key addition — points to your custom detection rules
include $RULE_PATH/custom.rules


# -----------------------------------------------------------------------------
# SECTION 9 — Threshold Configuration (Optional)
# Global threshold settings — can override per-rule thresholds
# -----------------------------------------------------------------------------
# config threshold: memcap 1048576


# -----------------------------------------------------------------------------
# NOTES
# -----------------------------------------------------------------------------
# Validate config before running:
#   sudo snort -T -c /etc/snort/snort.conf
#
# Run interactively (alerts print to console — good for testing):
#   sudo snort -A console -c /etc/snort/snort.conf -i enp0s3
#
# Run as background daemon:
#   sudo snort -D -c /etc/snort/snort.conf -i enp0s3
#
# Watch alert log:
#   sudo tail -f /var/log/snort/alert
