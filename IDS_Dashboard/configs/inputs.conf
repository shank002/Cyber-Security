# Splunk Universal Forwarder — inputs.conf
# Location: /opt/splunkforwarder/etc/system/local/inputs.conf
# Description: Configures which log files the forwarder monitors and ships to Splunk

# ─────────────────────────────────────────────
# Suricata eve.json — Primary source
# Rich JSON format — preferred for Splunk parsing
# ─────────────────────────────────────────────
[monitor:///var/log/suricata/eve.json]
disabled = false
index = ids_alerts
sourcetype = suricata
host = ubuntu-ids-lab

# ─────────────────────────────────────────────
# Suricata fast.log — Secondary source
# Human-readable one-line alerts
# ─────────────────────────────────────────────
[monitor:///var/log/suricata/fast.log]
disabled = false
index = ids_alerts
sourcetype = suricata_fast
host = ubuntu-ids-lab

# ─────────────────────────────────────────────
# Snort alert log — Secondary IDS source
# ─────────────────────────────────────────────
[monitor:///var/log/snort/alert]
disabled = false
index = ids_alerts
sourcetype = snort
host = ubuntu-ids-lab
